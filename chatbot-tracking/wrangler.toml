name = "chatbot-tracking"
main = "worker.js"
compatibility_date = "2025-01-01"

# Bind a KV namespace under the name EVENTS.
# Opret namespace med:
#   wrangler kv:namespace create CHATBOT_EVENTS
# og indsæt id'et nedenfor.
[[kv_namespaces]]
binding = "EVENTS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Secrets sættes via:
#   wrangler secret put SLACK_WEBHOOK_URL
# (NOT a [vars] entry — secrets logges ikke og kan ikke læses tilbage)
