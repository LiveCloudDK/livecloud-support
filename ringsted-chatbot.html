<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ringsted Festival Support</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    /* Overwritten by JS based on brand config */
    --primary: #7C3AED;
    --primary-light: #A78BFA;
    --primary-dark: #5B21B6;
    --accent: #F59E0B;
    --accent-light: #FCD34D;
    --bg: #0F0B1A;
    --bg-card: #1A1128;
    --bg-bubble-bot: #231836;
    --bg-bubble-user: #7C3AED;
    --text: #F3F0FF;
    --text-muted: #A89BC9;
    --border: #2D2245;
    --success: #10B981;
    --header-shadow: rgba(124, 58, 237, 0.3);
    --step-bg: rgba(124, 58, 237, 0.08);
    --step-border: rgba(124, 58, 237, 0.15);
    --hover-bg: rgba(124, 58, 237, 0.15);
    --info-bg: rgba(245, 158, 11, 0.08);
    --info-border: rgba(245, 158, 11, 0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ======= HEADER ======= */
  .header {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 4px 20px var(--header-shadow);
    position: relative;
    overflow: hidden;
  }

  .header::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--header-pattern, none);
    opacity: 0.06;
    pointer-events: none;
  }

  .header-icon {
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    backdrop-filter: blur(4px);
    position: relative;
    z-index: 1;
  }

  .header-text { position: relative; z-index: 1; }

  .header-text h1 {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }

  .header-text p {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
  }

  .header-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    backdrop-filter: blur(4px);
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ======= BRAND SWITCHER (demo only) ======= */

  /* ======= CHAT ======= */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ======= MESSAGES ======= */
  .message {
    display: flex;
    gap: 8px;
    max-width: 88%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.bot { align-self: flex-start; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .message-avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
    background: var(--bg-bubble-bot);
    border: 1px solid var(--border);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }

  .message.bot .bubble {
    background: var(--bg-bubble-bot);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
    color: var(--text);
  }

  .message.user .bubble {
    background: var(--bg-bubble-user);
    border-bottom-right-radius: 6px;
    color: white;
  }

  .bubble strong { color: var(--accent); font-weight: 600; }
  .bubble em { color: var(--primary-light); font-style: normal; }

  /* ======= QUICK REPLIES ======= */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 4px 0 4px 40px;
    animation: fadeIn 0.4s ease;
  }

  .quick-reply {
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .quick-reply:hover {
    border-color: var(--primary);
    background: var(--hover-bg);
    transform: translateY(-1px);
  }

  .quick-reply:active { transform: scale(0.97); }

  /* ======= STEPS ======= */
  .steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
  }

  .step {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--step-bg);
    border-radius: 12px;
    border: 1px solid var(--step-border);
  }

  .step-number {
    width: 24px;
    height: 24px;
    background: var(--primary);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .step-text {
    font-size: 13px;
    line-height: 1.4;
    color: var(--text);
  }

  /* ======= TYPING ======= */
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    align-items: center;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ======= INPUT ======= */
  .input-area {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .input-area input {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 12px 18px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-area input:focus { border-color: var(--primary); }
  .input-area input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 44px;
    height: 44px;
    background: var(--primary);
    border: none;
    border-radius: 50%;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  /* ======= FOOTER ======= */
  .powered-by {
    text-align: center;
    padding: 6px;
    font-size: 10px;
    color: var(--text-muted);
    opacity: 0.5;
    background: var(--bg-card);
    flex-shrink: 0;
  }

  /* ======= INFO CARD ======= */
  .info-card {
    background: var(--info-bg);
    border: 1px solid var(--info-border);
    border-radius: 12px;
    padding: 12px;
    margin-top: 8px;
  }

  .info-card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .info-card p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  
  /* ======= EVENT CARD ======= */
  .event-card {
    background: linear-gradient(135deg, var(--step-bg), var(--bg-card));
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-top: 8px;
  }

  .event-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .event-card-header span:first-child { font-size: 18px; }
  .event-card-header span:last-child {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }

  .event-card-detail {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .event-card-detail strong { color: var(--text); font-weight: 600; }
</style>
</head>
<body>

<div class="header" id="header">
  <div class="header-icon" id="headerIcon"></div>
  <div class="header-text">
    <h1 id="headerTitle"></h1>
    <p id="headerSubtitle"></p>
  </div>
  <div class="header-badge">
    <div class="status-dot"></div>
    <span>Online</span>
  </div>
</div>


<div class="chat-area" id="chatArea"></div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="Skriv din besked..." autocomplete="off">
  <button class="send-btn" id="sendBtn" onclick="handleSend()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>
<div class="powered-by" id="poweredBy"></div>

function findTopic(text) {
  const lower = text.toLowerCase().trim();
  // Remove common filler words for better matching
  const stripped = lower.replace(/\b(jeg|du|man|min|mit|mine|den|det|en|et|er|har|kan|vil|skal|gør|gøre|hvis|ikke|men|og|at|til|fra|med|på|af|om|også|bare|jo|så|da|der|her|hvad|hvordan|hvorfor|hvor|hvem|hvilke)\b/g, ' ').replace(/\s+/g, ' ').trim();

  let bestMatch = null;
  let bestScore = 0;

  // Pass 1: exact substring match (longest wins)
  for (const entry of keywordMap) {
    for (const key of entry.keys) {
      if (lower.includes(key) && key.length > bestScore) {
        bestScore = key.length;
        bestMatch = entry.topic;
      }
    }
  }
  if (bestMatch) return bestMatch;

  // Pass 2: check stripped text (filler words removed)
  for (const entry of keywordMap) {
    for (const key of entry.keys) {
      if (stripped.includes(key) && key.length > bestScore) {
        bestScore = key.length;
        bestMatch = entry.topic;
      }
    }
  }
  if (bestMatch) return bestMatch;

  // Pass 3: word-overlap scoring — count how many key-words appear in the text
  const words = new Set(lower.split(/\s+/));
  let bestOverlap = 0;
  for (const entry of keywordMap) {
    for (const key of entry.keys) {
      const keyWords = key.split(/\s+/);
      if (keyWords.length < 2) continue; // skip single-word keys for overlap
      const overlap = keyWords.filter(w => words.has(w)).length;
      const score = overlap / keyWords.length;
      if (overlap >= 2 && score > bestOverlap) {
        bestOverlap = score;
        bestMatch = entry.topic;
      }
    }
  }
  return bestMatch;
}

function addMessage(type, content) {
  const wrapper = document.createElement('div');
  wrapper.className = `message ${type}`;
  if (type === 'bot') {
    const avatar = document.createElement('div');
    avatar.className = 'message-avatar';
    avatar.textContent = brand().icon;
    wrapper.appendChild(avatar);
  }
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = content;
  wrapper.appendChild(bubble);
  chatArea.appendChild(wrapper);
  scrollToBottom();
}

function addSteps(steps) {
  if (!steps || steps.length === 0) return;
  const msg = document.createElement('div');
  msg.className = 'message bot';
  msg.style.maxWidth = '92%';
  const avatar = document.createElement('div');
  avatar.className = 'message-avatar';
  avatar.textContent = brand().icon;
  msg.appendChild(avatar);
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const stepsDiv = document.createElement('div');
  stepsDiv.className = 'steps';
  steps.forEach((text, i) => {
    const step = document.createElement('div');
    step.className = 'step';
    step.innerHTML = `<div class="step-number">${i + 1}</div><div class="step-text">${text}</div>`;
    stepsDiv.appendChild(step);
  });
  bubble.appendChild(stepsDiv);
  msg.appendChild(bubble);
  chatArea.appendChild(msg);
  scrollToBottom();
}

// ================================================================
// Map topics to screen mockups and captions

function handleTopic(topic) {
  const kb = getKB();
  const data = kb[topic];
  if (!data) { showFallback(); return; }

  showTyping();
  setTimeout(() => {
    hideTyping();
    addMessage('bot', data.reply);
    setTimeout(() => {
      if (data.eventCard) {
        addEventCard();
      } else {
        addSteps(data.steps);
      }
      setTimeout(() => {
        addInfoCard(data.followUp);
        setTimeout(() => {
          const related = (data.related || []).filter(t => t !== topic);
          if (related.length > 0) {
            addMessage('bot', brand().helpMore);
            addQuickReplies([...related, 'kontakt']);
          }
        }, 400);
      }, 400);
    }, 400);
  }, 600);
}

function showFallback() {
  showTyping();
  setTimeout(() => {
    hideTyping();
    addMessage('bot', brand().fallback);
    addQuickReplies(['profil', 'claim', 'transfer', 'beats', 'billet', 'event', 'kontakt']);
  }, 500);
}

function handleSend() {
  const text = userInput.value.trim();
  if (!text) return;
  addMessage('user', text);
  userInput.value = '';
  document.querySelectorAll('.quick-replies').forEach(el => el.remove());
  const topic = findTopic(text);
  if (topic) { handleTopic(topic); } else { showFallback(); }
}

userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSend(); });

// ================================================================
// INIT
// ================================================================
(function init() {
  activeBrand = 'ringsted';
  applyTheme('ringsted');
  chatArea.innerHTML = '';

  // Deep-link support: ?topic=<name> opens a specific topic directly.
  //                    ?q=<text>     sends a raw question through keyword matching.
  const params = new URLSearchParams(window.location.search);
  const deepTopic = params.get('topic');
  const deepQuery = params.get('q');

  setTimeout(() => {
    addMessage('bot', brand().welcome);
    setTimeout(() => {
      if (deepTopic && getKB()[deepTopic]) {
        // Simulate user asking about this topic, then answer it directly.
        setTimeout(() => {
          addMessage('user', getKB()[deepTopic].title);
          setTimeout(() => handleTopic(deepTopic), 400);
        }, 300);
      } else if (deepQuery) {
        setTimeout(() => {
          addMessage('user', deepQuery);
          const topic = findTopic(deepQuery);
          setTimeout(() => { topic ? handleTopic(topic) : showFallback(); }, 400);
        }, 300);
      } else {
        addMessage('bot', brand().welcomeFollowup);
        setTimeout(() => {
          addQuickReplies(['profil', 'claim', 'transfer', 'billet', 'beats', 'armbånd', 'program', 'event', 'app']);
        }, 300);
      }
    }, 500);
  }, 300);
})();
